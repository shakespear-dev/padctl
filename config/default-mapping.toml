name = "default"

# Minimal out-of-the-box mapping.
# For the full reference with all supported fields and options,
# see config/example-mapping.toml or the online docs.
#
# Runtime switch:  padctl switch <name>
# Auto-load:       set default_mapping = "default" in ~/.config/padctl/config.toml

[remap]
M1 = "KEY_F13"   # back paddle → macro / media key
M2 = "KEY_F14"
