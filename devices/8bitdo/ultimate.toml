[device]
name = "8BitDo Ultimate Controller"
vid = 0x2dc8
pid = 0x6003

[[device.interface]]
id = 0
class = "hid"

# --- USB HID gamepad input (Report ID 0x01, 64 bytes) ---
# Standard XInput-style HID gamepad report.
[[report]]
name = "usb"
interface = 0
size = 64

[report.match]
offset = 0
expect = [0x01]

[report.fields]
left_x  = { offset = 1, type = "i16le" }
left_y  = { offset = 3, type = "i16le", transform = "negate" }
right_x = { offset = 5, type = "i16le" }
right_y = { offset = 7, type = "i16le", transform = "negate" }
lt      = { offset = 9,  type = "u8" }
rt      = { offset = 10, type = "u8" }

[report.button_group]
# bytes 11-12: standard gamepad button layout
# bit 0=A 1=B 2=X 3=Y 4=LB 5=RB 6=Select 7=Start 8=Home 9=LS 10=RS
source = { offset = 11, size = 2 }
map = { A = 0, B = 1, X = 2, Y = 3, LB = 4, RB = 5, Select = 6, Start = 7, Home = 8, LS = 9, RS = 10 }

# --- Output device ---
[output]
name = "8BitDo Ultimate Controller"
vid = 0x2dc8
pid = 0x6003

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"

[output.dpad]
type = "hat"
