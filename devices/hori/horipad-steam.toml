[device]
name = "HORI Horipad Steam"
vid = 0x0f0d
pid = 0x00c5

[[device.interface]]
id = 0
class = "hid"

# --- BT input (Report ID 0x07, 287 bytes) ---
# offset 1-4:   sticks L_X/L_Y/R_X/R_Y (u8, center=128)
# offset 5:     buttons[0]: bit0=X bit1=Quick bit2=B bit3=A bits4-7=DPad(enum)
# offset 6:     buttons[1]: bit0=Menu bit1=View bit2=RT_dig bit3=LT_dig bit4=RB bit5=LB bit6=M1 bit7=Y
# offset 7:     buttons[2]: bit0=M4 bit1=M3 bit2=RS_touch bit3=LS_touch bit4=M2 bit5=RS bit6=LS bit7=Steam
# offset 8-9:   analog triggers RT/LT (u8)
# offset 12-23: IMU — gyro yaw/roll/pitch (i16le) + accel Z/Y/X (i16le)
# offset 24:    battery: bit7=charging bits3-0=charge_pct
[[report]]
name = "bt"
interface = 0
size = 287

[report.match]
offset = 0
expect = [0x07]

[report.fields]
left_x  = { offset = 1,  type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 2,  type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 3,  type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 4,  type = "u8", transform = "scale(-32768, 32767), negate" }
lt      = { offset = 9,  type = "u8" }
rt      = { offset = 8,  type = "u8" }
gyro_x  = { offset = 12, type = "i16le" }
gyro_y  = { offset = 14, type = "i16le" }
gyro_z  = { offset = 16, type = "i16le" }
accel_x = { offset = 22, type = "i16le" }
accel_y = { offset = 20, type = "i16le" }
accel_z = { offset = 18, type = "i16le" }

# buttons[0] byte 5: bit0=X bit1=M3(quick) bit2=B bit3=A  (DPad in bits 4-7, handled by hat output)
# buttons[1] byte 6: bit0=Start(menu) bit1=Select(view) bit2=RT bit3=LT bit4=RB bit5=LB bit6=M1 bit7=Y
# buttons[2] byte 7: bit0=M4 bit1=M2 bit2=TouchPad(RS_touch) bit3=LS bit4=M3 bit5=RS bit6=LS_dig bit7=Home(Steam)
# Use 3-byte group covering bytes 5-7
[report.button_group]
source = { offset = 5, size = 3 }
map = { X = 0, B = 2, A = 3, Start = 8, Select = 9, RT = 10, LT = 11, RB = 12, LB = 13, M1 = 14, Y = 15, M4 = 16, M2 = 17, RS = 21, LS = 22, Home = 23 }

# --- Output device ---
[output]
name = "HORI Horipad Steam"
vid = 0x0f0d
pid = 0x00c5

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
LT     = "BTN_TL2"
RT     = "BTN_TR2"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY1"
M2     = "BTN_TRIGGER_HAPPY2"
M4     = "BTN_TRIGGER_HAPPY4"

[output.dpad]
type = "hat"
