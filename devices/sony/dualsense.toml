[device]
name = "Sony DualSense"
vid = 0x054c
pid = 0x0ce6

[[device.interface]]
id = 3
class = "hid"   # EP3 OUT + EP4 IN Interrupt 64B; IF0-IF2 are audio, skipped

# --- USB input (Report ID 0x01, 64 bytes) ---
[[report]]
name = "usb"
interface = 3
size = 64

[report.match]
offset = 0
expect = [0x01]

[report.fields]
# Joysticks: u8 0x00=left/up, 0xFF=right/down; scale to -32768..32767, Y negate
left_x  = { offset = 1, type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 2, type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 3, type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 4, type = "u8", transform = "scale(-32768, 32767), negate" }
# Triggers: u8 0x00=released, 0xFF=fully pressed
lt      = { offset = 5, type = "u8" }
rt      = { offset = 6, type = "u8" }
# IMU: i16le; byte 7 = seq_number (ignored)
gyro_x  = { offset = 16, type = "i16le" }
gyro_y  = { offset = 18, type = "i16le" }
gyro_z  = { offset = 20, type = "i16le" }
accel_x = { offset = 22, type = "i16le" }
accel_y = { offset = 24, type = "i16le" }
accel_z = { offset = 26, type = "i16le" }
# Sensor timestamp: u32le microseconds
sensor_timestamp = { offset = 28, type = "u32le" }
# Touchpad contact bytes (offset 33/37): bit7=inactive, bits[6:0]=finger ID
# Sub-byte extraction (bits DSL) is Phase 2; raw contact bytes declared here
touch0_contact = { offset = 33, type = "u8" }
touch1_contact = { offset = 37, type = "u8" }
# Battery: bits[3:0]=level(0-10), bits[7:4]=charging state (ignored)
battery_level  = { bits = [53, 0, 4] }

# Button bit layout across bytes 8-10:
# byte 8 bits 4-7: Square=4, Cross=5, Circle=6, Triangle=7
# byte 9 bits 0-7: L1=8, R1=9, L2_dig=10, R2_dig=11, Create=12, Options=13, L3=14, R3=15
# byte 10 bits 0-2: PS=16, Touchpad=17, Mute=18
[report.button_group]
source = { offset = 8, size = 3 }
map = { X = 4, A = 5, B = 6, Y = 7, LB = 8, RB = 9, LT = 10, RT = 11, Select = 12, Start = 13, LS = 14, RS = 15, Home = 16, TouchPad = 17, Mic = 18 }

# --- BT extended input (Report ID 0x31, 78 bytes) ---
# Sent after any output report triggers extended mode.
# Byte 1 is a BT-only flag byte; all USB offsets shift +1.
# CRC32 at bytes 74-77, seed byte 0xa1 prepended before data.
[[report]]
name = "bt"
interface = 3
size = 78

[report.match]
offset = 0
expect = [0x31]

[report.fields]
left_x  = { offset = 2, type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 3, type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 4, type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 5, type = "u8", transform = "scale(-32768, 32767), negate" }
lt      = { offset = 6, type = "u8" }
rt      = { offset = 7, type = "u8" }
gyro_x  = { offset = 17, type = "i16le" }
gyro_y  = { offset = 19, type = "i16le" }
gyro_z  = { offset = 21, type = "i16le" }
accel_x = { offset = 23, type = "i16le" }
accel_y = { offset = 25, type = "i16le" }
accel_z = { offset = 27, type = "i16le" }
sensor_timestamp = { offset = 29, type = "u32le" }
touch0_contact = { offset = 34, type = "u8" }
touch1_contact = { offset = 38, type = "u8" }
battery_level  = { bits = [54, 0, 4] }

# Button bit layout: same as USB but at bytes 9-11 (+1 offset)
[report.button_group]
source = { offset = 9, size = 3 }
map = { X = 4, A = 5, B = 6, Y = 7, LB = 8, RB = 9, LT = 10, RT = 11, Select = 12, Start = 13, LS = 14, RS = 15, Home = 16, TouchPad = 17, Mic = 18 }

[report.checksum]
algo = "crc32"
range = [0, 74]
seed = 0xa1
expect = { offset = 74, type = "u32le" }

# --- WASM plugin: IMU calibration via Feature Report 0x05 ---
[wasm]
plugin = "plugins/sony_imu_calibration.wasm"
calibration_reports = [0x05]

[wasm.overrides]
process_report = true

# --- Commands (USB Report ID 0x02, 63-byte output) ---
# valid_flag0 = byte 1; valid_flag1 = byte 2
# Rumble: set COMPATIBLE_VIBRATION (valid_flag0 bit 0 = 0x01)
# byte 3 = motor_right (weak/high-freq), byte 4 = motor_left (strong/low-freq)
[commands.rumble]
interface = 3
template = "02 01 00 {weak:u8} {strong:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# LED: set LIGHTBAR_CONTROL (valid_flag1 bit 2 = 0x04) + LIGHTBAR_SETUP_CONTROL (valid_flag2 bit 1)
# byte 1=valid_flag0=0x00, byte 2=valid_flag1=0x04, byte 39=valid_flag2=0x02, byte 42=lightbar_setup=0x01
# byte 45=R, byte 46=G, byte 47=B
[commands.led]
interface = 3
template = "02 00 04 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 02 00 00 01 00 00 {r:u8} {g:u8} {b:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# --- Adaptive trigger output report byte layout ---
# byte 1 = valid_flag0: bit2=right trigger, bit3=left trigger (0x0c = both)
# bytes 11-21 = right trigger: [mode, param0, param1, ...]
# bytes 22-32 = left trigger:  [mode, param0, param1, ...]
# Modes: 0x00=Off, 0x01=Feedback, 0x02=Weapon, 0x06=Vibration

# Adaptive trigger: Off (both triggers)
[commands.adaptive_trigger_off]
interface = 3
template = "02 0c 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# Adaptive trigger: Feedback — continuous resistance from position with given strength
# Right: mode 0x01 at byte 11, position at byte 12, strength at byte 13
# Left:  mode 0x01 at byte 22, position at byte 23, strength at byte 24
[commands.adaptive_trigger_feedback]
interface = 3
template = "02 0c 00 00 00 00 00 00 00 00 00 01 {r_position:u8} {r_strength:u8} 00 00 00 00 00 00 00 00 01 {l_position:u8} {l_strength:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# Adaptive trigger: Weapon — click at start position with given strength, releases after end
# Right: mode 0x02 at byte 11, start at byte 12, end at byte 13, strength at byte 14
# Left:  mode 0x02 at byte 22, start at byte 23, end at byte 24, strength at byte 25
[commands.adaptive_trigger_weapon]
interface = 3
template = "02 0c 00 00 00 00 00 00 00 00 00 02 {r_start:u8} {r_end:u8} {r_strength:u8} 00 00 00 00 00 00 00 02 {l_start:u8} {l_end:u8} {l_strength:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# Adaptive trigger: Vibration — motor vibration effect
# Right: mode 0x06 at byte 11, position at byte 12, amplitude at byte 13, frequency at byte 14
# Left:  mode 0x06 at byte 22, position at byte 23, amplitude at byte 24, frequency at byte 25
[commands.adaptive_trigger_vibration]
interface = 3
template = "02 0c 00 00 00 00 00 00 00 00 00 06 {r_position:u8} {r_amplitude:u8} {r_frequency:u8} 00 00 00 00 00 00 00 06 {l_position:u8} {l_amplitude:u8} {l_frequency:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# --- Output device ---
[output]
name = "Sony DualSense"
vid = 0x054c
pid = 0x0ce6

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A        = "BTN_SOUTH"
B        = "BTN_EAST"
X        = "BTN_WEST"
Y        = "BTN_NORTH"
LB       = "BTN_TL"
RB       = "BTN_TR"
Select   = "BTN_SELECT"
Start    = "BTN_START"
Home     = "BTN_MODE"
LS       = "BTN_THUMBL"
RS       = "BTN_THUMBR"
TouchPad = "BTN_TOUCH"
Mic      = "BTN_MISC"

[output.dpad]
type = "hat"

[output.force_feedback]
type = "rumble"
max_effects = 16
