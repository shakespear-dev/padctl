[device]
name = "Sony DualSense"
vid = 0x054c
pid = 0x0ce6

[[device.interface]]
id = 3
class = "hid"   # EP3 OUT + EP4 IN Interrupt 64B; IF0-IF2 are audio, skipped

# --- USB input (Report ID 0x01, 64 bytes) ---
[[report]]
name = "usb"
interface = 3
size = 64

[report.match]
offset = 0
expect = [0x01]

[report.fields]
# Joysticks: u8 0x00=left/up, 0xFF=right/down; scale to -32768..32767, Y negate
left_x  = { offset = 1, type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 2, type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 3, type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 4, type = "u8", transform = "scale(-32768, 32767), negate" }
# Triggers: u8 0x00=released, 0xFF=fully pressed
lt      = { offset = 5, type = "u8" }
rt      = { offset = 6, type = "u8" }
# IMU: i16le; byte 7 = seq_number (ignored)
gyro_x  = { offset = 16, type = "i16le" }
gyro_y  = { offset = 18, type = "i16le" }
gyro_z  = { offset = 20, type = "i16le" }
accel_x = { offset = 22, type = "i16le" }
accel_y = { offset = 24, type = "i16le" }
accel_z = { offset = 26, type = "i16le" }

# Button bit layout across bytes 8-10:
# byte 8 bits 0-3: D-Pad hat (nibble, non-bitmask — DSL gap, omitted)
# byte 8 bits 4-7: Square=4, Cross=5, Circle=6, Triangle=7
# byte 9 bits 0-7: L1=0, R1=1, L2_dig=2, R2_dig=3, Create=4, Options=5, L3=6, R3=7
# byte 10 bits 0-2: PS=0, Touchpad=1, Mute=2
# button_group source covers all 3 bytes; absolute bit index = byte_rel*8 + bit
# Button bit layout across bytes 8-10:
# byte 8 bits 4-7: Square=4, Cross=5, Circle=6, Triangle=7
# byte 9 bits 0-7: L1=8, R1=9, L2_dig=10, R2_dig=11, Create=12, Options=13, L3=14, R3=15
# byte 10 bits 0-2: PS=16, Touchpad=17, Mute=18
[report.button_group]
source = { offset = 8, size = 3 }
map = { X = 4, A = 5, B = 6, Y = 7, LB = 8, RB = 9, LT = 10, RT = 11, Select = 12, Start = 13, LS = 14, RS = 15, Home = 16, TouchPad = 17, Mic = 18 }

# --- Commands (USB Report ID 0x02, 63-byte output) ---
# valid_flag0 = byte 1; valid_flag1 = byte 2
# Rumble: set COMPATIBLE_VIBRATION (valid_flag0 bit 0 = 0x01)
[commands.rumble]
interface = 3
template = "02 01 00 {strong:u8} {weak:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# LED: set LIGHTBAR_CONTROL (valid_flag1 bit 2 = 0x04) + LIGHTBAR_SETUP_CONTROL (valid_flag2 bit 1)
# byte 1=valid_flag0=0x00, byte 2=valid_flag1=0x04, byte 39=valid_flag2=0x02, byte 42=lightbar_setup=0x01
# byte 45=R, byte 46=G, byte 47=B
[commands.led]
interface = 3
template = "02 00 04 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 02 00 00 01 00 00 {r:u8} {g:u8} {b:u8} 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"

# --- Output device ---
[output]
name = "Sony DualSense"
vid = 0x054c
pid = 0x0ce6

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A        = "BTN_SOUTH"
B        = "BTN_EAST"
X        = "BTN_NORTH"
Y        = "BTN_WEST"
LB       = "BTN_TL"
RB       = "BTN_TR"
Select   = "BTN_SELECT"
Start    = "BTN_START"
Home     = "BTN_MODE"
LS       = "BTN_THUMBL"
RS       = "BTN_THUMBR"
TouchPad = "BTN_TOUCH"
Mic      = "BTN_MISC"

[output.dpad]
type = "hat"

[output.force_feedback]
type = "rumble"
max_effects = 16
