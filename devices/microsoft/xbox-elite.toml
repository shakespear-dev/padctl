[device]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[[device.interface]]
id = 0
class = "hid"

# --- USB HID input (Report ID 0x01, 64 bytes) ---
# GIP protocol; report structure follows XInput HID descriptor.
[[report]]
name = "usb"
interface = 0
size = 64

[report.match]
offset = 0
expect = [0x01]

[report.fields]
left_x  = { offset = 1, type = "i16le" }
left_y  = { offset = 3, type = "i16le", transform = "negate" }
right_x = { offset = 5, type = "i16le" }
right_y = { offset = 7, type = "i16le", transform = "negate" }
lt      = { offset = 9,  type = "u16le", transform = "scale(0, 255)" }
rt      = { offset = 11, type = "u16le", transform = "scale(0, 255)" }
# Paddles: byte 13 bits 0-3 (Paddle1-4 mapped as M1-M4)
paddle_raw = { offset = 13, type = "u8" }

[report.button_group]
# bytes 14-15: standard + elite button layout
# bit 0=A 1=B 2=X 3=Y 4=LB 5=RB 6=Select/View 7=Start/Menu 8=LS 9=RS 10=Home
source = { offset = 14, size = 2 }
map = { A = 0, B = 1, X = 2, Y = 3, LB = 4, RB = 5, Select = 6, Start = 7, LS = 8, RS = 9, Home = 10 }

# --- Commands ---
[commands.rumble]
interface = 0
template = "09 00 00 09 00 0f {strong:u8} {weak:u8} {left_trigger:u8} {right_trigger:u8} ff 00 00"

# --- Output device ---
[output]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"

[output.dpad]
type = "hat"

[output.force_feedback]
type = "rumble"
max_effects = 4
