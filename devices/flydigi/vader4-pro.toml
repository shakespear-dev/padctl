[device]
name = "Flydigi Vader 4 Pro"
vid = 0x37d7
pid = 0x3001

[[device.interface]]
id = 0
class = "hid"

# --- Extended input (Report ID 0x04, 32 bytes) ---
# offset 7:   buttons[0]: L5/R5/L4/R4/M2/M1
# offset 8:   buttons[1]: Home/Quick
# offset 9:   buttons[2]: Y/View/B/A + DPad(enum bits4-7)
# offset 10:  buttons[3]: RS/LS/RT/LT/RB/LB/Menu/X
# offset 11-16: accel X/Y/Z (3x i16le)
# offset 17:  left_stick_x (u8)
# offset 19:  left_stick_y (u8)
# offset 21:  right_stick_x (u8)
# offset 22:  right_stick_y (u8)
# offset 23:  analog trigger L (u8)
# offset 24:  analog trigger R (u8)
# offset 26-27: gyro_x (i16le)
# offset 29-30: gyro_z (i16le)
# Note: gyro_y is split across bytes 18 (lo) and 20 (hi); mapped as raw lo byte only
[[report]]
name = "extended"
interface = 0
size = 32

[report.match]
offset = 0
expect = [0x04]

[report.fields]
left_x  = { offset = 17, type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 19, type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 21, type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 22, type = "u8", transform = "scale(-32768, 32767), negate" }
lt      = { offset = 23, type = "u8" }
rt      = { offset = 24, type = "u8" }
gyro_x  = { offset = 26, type = "i16le" }
gyro_z  = { offset = 29, type = "i16le" }
accel_x = { offset = 11, type = "i16le" }
accel_y = { offset = 13, type = "i16le" }
accel_z = { offset = 15, type = "i16le" }

# buttons[0] byte 7:  bit0=M3(L5) bit1=M4(R5) bit2=M1(L4) bit3=M2(R4) bit4=M2 bit5=M1
# buttons[1] byte 8:  bit0=Home bit1=Select(quick)
# buttons[2] byte 9:  bit0=Y bit1=Select(view) bit2=B bit3=A  (DPad bits 4-7)
# buttons[3] byte 10: bit0=RS bit1=LS bit2=RT bit3=LT bit4=RB bit5=LB bit6=Start(menu) bit7=X
# Use 4-byte group covering bytes 7-10
[report.button_group]
source = { offset = 7, size = 4 }
map = { M3 = 0, M4 = 1, M1 = 2, M2 = 3, Home = 8, Select = 9, Y = 16, B = 18, A = 19, RS = 24, LS = 25, RT = 26, LT = 27, RB = 28, LB = 29, Start = 30, X = 31 }

# --- Output device ---
[output]
name = "Flydigi Vader 4 Pro"
vid = 0x37d7
pid = 0x3001

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
LT     = "BTN_TL2"
RT     = "BTN_TR2"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY1"
M2     = "BTN_TRIGGER_HAPPY2"
M3     = "BTN_TRIGGER_HAPPY3"
M4     = "BTN_TRIGGER_HAPPY4"

[output.dpad]
type = "hat"
