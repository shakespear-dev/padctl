[device]
name = "Flydigi Vader 4 Pro (DInput/2.4G)"
vid = 0x04b4
pid = 0x2412

# Community reports show this variant on interface 2 in DInput/2.4G mode.
[[device.interface]]
id = 2
class = "hid"

# --- Extended input (Report ID 0x04, 32 bytes) ---
[[report]]
name = "extended"
interface = 2
size = 32

[report.match]
offset = 0
expect = [0x04]

[report.fields]
left_x  = { offset = 17, type = "u8", transform = "scale(-32768, 32767)" }
left_y  = { offset = 19, type = "u8", transform = "scale(-32768, 32767), negate" }
right_x = { offset = 21, type = "u8", transform = "scale(-32768, 32767)" }
right_y = { offset = 22, type = "u8", transform = "scale(-32768, 32767), negate" }
lt      = { offset = 23, type = "u8" }
rt      = { offset = 24, type = "u8" }
gyro_x  = { offset = 26, type = "i16le" }
gyro_z  = { offset = 29, type = "i16le" }
accel_x = { offset = 11, type = "i16le" }
accel_y = { offset = 13, type = "i16le" }
accel_z = { offset = 15, type = "i16le" }

[report.button_group]
source = { offset = 7, size = 4 }
map = { M3 = 0, M4 = 1, M1 = 2, M2 = 3, Home = 8, Select = 9, Y = 16, B = 18, A = 19, RS = 24, LS = 25, RT = 26, LT = 27, RB = 28, LB = 29, Start = 30, X = 31 }

[output]
name = "Flydigi Vader 4 Pro"
vid = 0x37d7
pid = 0x3001

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
LT     = "BTN_TL2"
RT     = "BTN_TR2"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY1"
M2     = "BTN_TRIGGER_HAPPY2"
M3     = "BTN_TRIGGER_HAPPY3"
M4     = "BTN_TRIGGER_HAPPY4"

[output.dpad]
type = "hat"
