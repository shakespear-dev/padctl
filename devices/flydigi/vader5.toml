[device]
name = "Flydigi Vader 5 Pro"
vid = 0x37d7
pid = 0x2401

[[device.interface]]
id = 0
class = "vendor"   # libusb; EP1 IN 20B main input, EP5 OUT 8B Xbox rumble

[[device.interface]]
id = 1
class = "hid"      # hidraw; EP2 IN 32B extended input, EP6 OUT 32B config commands

[device.init]
commands = [
    "5aa5 0102 03",
    "5aa5 a102 a3",
    "5aa5 0202 04",
    "5aa5 0402 06",
]
response_prefix = [0x5a, 0xa5]
enable  = "5aa5 1107 ff01 ffff ff15 00"
disable = "5aa5 1107 ff00 ffff ff14 00"

# --- IF1 extended input (magic 5a a5 ef, 32 bytes) ---
[[report]]
name = "extended"
interface = 1
size = 32

[report.match]
offset = 0
expect = [0x5a, 0xa5, 0xef]

[report.fields]
left_x  = { offset = 3,  type = "i16le" }
left_y  = { offset = 5,  type = "i16le", transform = "negate" }
right_x = { offset = 7,  type = "i16le" }
right_y = { offset = 9,  type = "i16le", transform = "negate" }
lt      = { offset = 15, type = "u8" }
rt      = { offset = 16, type = "u8" }
gyro_x  = { offset = 17, type = "i16le" }
gyro_y  = { offset = 19, type = "i16le" }
gyro_z  = { offset = 21, type = "i16le" }
accel_x = { offset = 23, type = "i16le" }
accel_y = { offset = 25, type = "i16le" }
accel_z = { offset = 27, type = "i16le" }

[report.button_group]
source = { offset = 11, size = 4 }
map = { DPadUp = 0, DPadRight = 1, DPadDown = 2, DPadLeft = 3, A = 4, B = 5, Select = 6, X = 7, Y = 8, Start = 9, LB = 10, RB = 11, LS = 14, RS = 15, C = 16, Z = 17, M1 = 18, M2 = 19, M3 = 20, M4 = 21, LM = 22, RM = 23, O = 24, Home = 27 }

# --- IF0 standard input (Xbox-compatible, 20 bytes) ---
[[report]]
name = "standard"
interface = 0
size = 20

[report.match]
offset = 0
expect = [0x00]

[report.fields]
left_x  = { offset = 6,  type = "i16le" }
left_y  = { offset = 8,  type = "i16le", transform = "negate" }
right_x = { offset = 10, type = "i16le" }
right_y = { offset = 12, type = "i16le", transform = "negate" }
lt      = { offset = 4,  type = "u8" }
rt      = { offset = 5,  type = "u8" }

[report.button_group]
source = { offset = 2, size = 2 }
map = { DPadUp = 0, DPadDown = 1, DPadLeft = 2, DPadRight = 3, Start = 4, Select = 5, LS = 6, RS = 7, LB = 8, RB = 9, Home = 10, A = 12, B = 13, X = 14, Y = 15 }

# --- Commands ---
[commands.rumble]
interface = 0
template = "00 08 00 {strong:u8} {weak:u8} 00 00 00"

# --- Output device ---
# Masquerade as Xbox Elite Series 2 (VID 045e PID 0b00) so that Steam and
# most games apply Xbox button mappings without additional configuration.
[output]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_NORTH"
Y      = "BTN_WEST"
LB     = "BTN_TL"
RB     = "BTN_TR"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY1"
M2     = "BTN_TRIGGER_HAPPY2"
M3     = "BTN_TRIGGER_HAPPY3"
M4     = "BTN_TRIGGER_HAPPY4"
C      = "BTN_TRIGGER_HAPPY5"
Z      = "BTN_TRIGGER_HAPPY6"
LM     = "BTN_TRIGGER_HAPPY7"
RM     = "BTN_TRIGGER_HAPPY8"
O      = "BTN_TRIGGER_HAPPY9"

[output.dpad]
type = "hat"

[output.force_feedback]
type = "rumble"
max_effects = 16
