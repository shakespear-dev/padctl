name: Validate Device Configs
on:
  push:
    paths:
      - 'devices/**'
      - 'src/tools/validate.zig'
      - 'src/config/device.zig'
  pull_request:
    paths:
      - 'devices/**'
      - 'src/tools/validate.zig'
      - 'src/config/device.zig'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libusb
        run: sudo apt-get install -y libusb-1.0-0-dev
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build
      - name: Validate all device configs
        run: |
          for f in devices/**/*.toml; do
            [ -f "$f" ] || continue
            ./zig-out/bin/padctl --validate "$f"
          done
