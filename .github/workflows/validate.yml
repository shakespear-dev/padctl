name: Validate Device Configs
on:
  push:
    paths:
      - 'devices/**'
      - 'src/tools/validate.zig'
      - 'src/config/device.zig'
  pull_request:
    paths:
      - 'devices/**'
      - 'src/tools/validate.zig'
      - 'src/config/device.zig'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: Build
        run: zig build
      - name: Validate all device configs
        run: |
          ./zig-out/bin/padctl --validate \
            devices/sony/dualsense.toml \
            devices/nintendo/switch-pro.toml \
            devices/8bitdo/ultimate.toml \
            devices/microsoft/xbox-elite.toml \
            devices/flydigi/vader5.toml
