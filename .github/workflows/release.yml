name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-linux-musl, aarch64-linux-musl]

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dlibusb=false

      - name: Package
        run: |
          VERSION=${{ github.ref_name }}
          TARGET=${{ matrix.target }}
          ARCHIVE=padctl-${VERSION}-${TARGET}.tar.gz
          STAGING=padctl-${VERSION}-${TARGET}
          mkdir -p "${STAGING}/bin"
          cp zig-out/bin/padctl "${STAGING}/bin/"
          cp -r devices contrib install "${STAGING}/"
          tar czf "${ARCHIVE}" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload tarball
        run: gh release upload ${{ github.ref_name }} "${{ env.ARCHIVE }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact for checksums
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  checksums:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: sha256sum padctl-*.tar.gz > SHA256SUMS.txt

      - name: Generate CHANGELOG.md
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          {
            echo "# Changelog — ${{ github.ref_name }}"
            echo
            if [ -n "${PREV}" ]; then
              git log --oneline "${PREV}..${{ github.ref_name }}"
            else
              git log --oneline "${{ github.ref_name }}"
            fi
          } > CHANGELOG.md

      - name: Upload checksums and changelog
        run: gh release upload ${{ github.ref_name }} SHA256SUMS.txt CHANGELOG.md --clobber
        env:
          GH_TOKEN: ${{ github.token }}
